<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特质交换信箱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f0f4f8; 
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5a4a42;
            overflow-x: hidden;
        }
        .container {
            width: 90%;
            max-width: 550px;
            background: rgba(255, 248, 220, 0.90);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 { color: #d46b6b; margin-bottom: 25px; font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        textarea {
            width: 100%; height: 140px; padding: 20px; border: 2px dashed #e0c9a6; border-radius: 12px;
            font-size: 17px; resize: none; background: rgba(255, 255, 255, 0.7); color: #5a4a42;
            outline: none; transition: all 0.3s; line-height: 1.6; font-family: 'KaiTi', '楷体', serif;
        }
        textarea:focus { border-color: #d46b6b; background: rgba(255, 255, 255, 0.95); box-shadow: 0 0 15px rgba(212, 107, 107, 0.2); transform: scale(1.02); }
        button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); color: white; border: none;
            padding: 14px 45px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 25px;
            transition: all 0.3s; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.6); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .status { margin-top: 20px; color: #888; font-size: 15px; line-height: 1.6; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; }
        .result-box {
            display: none; text-align: left; background: rgba(255, 255, 255, 0.9); border: 1px solid #eecfa1;
            padding: 25px; margin-top: 25px; border-radius: 15px; font-size: 17px; line-height: 1.8;
        }
        .hidden { display: none; }
        @media (max-width: 600px) { .container { padding: 30px 20px; width: 85%; } h1 { font-size: 22px; } }
    </style>
</head>
<body>

<div class="container">
    <h1>💌 特质交换信箱</h1>
    <div id="input-area">
        <p style="margin-bottom: 10px; color: #666;">请写下对方的特质：</p>
        <textarea id="trait-input" placeholder="例如：温柔、像小太阳一样..." onfocus="handleFocus()"></textarea>
        <br>
        <button id="submit-btn" onclick="submitTrait()">投入信箱</button>
        <p class="status" id="status-text">正在初始化房间...</p>
    </div>
    <div id="result-area" class="hidden">
        <h2 style="color: #d46b6b; margin-bottom: 20px;">🎉 信件交换成功！</h2>
        <div class="result-box" style="display:block;">
            <span class="result-title">✨ 对方写给你的：</span>
            <p id="other-trait" style="font-style: italic; color: #555; margin-top:5px;">加载中...</p>
        </div>
        <div class="result-box" style="display:block; background: rgba(255,255,255,0.5); border-style: dotted;">
            <span class="result-title">📝 你写给对方的：</span>
            <p id="my-trait" style="color: #888; margin-top:5px;"></p>
        </div>
    </div>
</div>

<script>
    // ================= 配置区域 =================
    const SUPABASE_URL = 'https://tiobxvolzuzctdzfpjjv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpb2J4dm9senV6Y3RkemZwamp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM4NjIsImV4cCI6MjA4ODAzOTg2Mn0.-QVOcDy4WZwHmuWbqdJ-8HXdqjJYIX-2UrLLE7VxugA';
    const GITHUB_USER = 'cyxFF8899'; 
    const REPO_NAME = 'trait-mailbox';
    // ===========================================

    // ⚠️ 注意：整个文件里，这行代码只能出现一次！
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const IMAGES = {
        waiting: `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/bg-waiting.png`,
        writing: `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/bg-writing.png`,
        submitted: `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/bg-submitted.png`,
        success: `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/bg-success.png`
    };

    function setBackground(imageName) {
        const imgUrl = IMAGES[imageName];
        if (!imgUrl) return;
        
        const img = new Image();
        img.onload = function() {
            document.body.style.backgroundImage = `url('${imgUrl}')`;
        };
        img.onerror = function() {
            console.error('图片加载失败:', imgUrl);
        };
        img.src = imgUrl;
    }

    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room');

    if (!roomId) {
        roomId = Math.random().toString(36).substring(2, 8); 
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + roomId;
        window.history.replaceState({path:newUrl},'',newUrl);
        document.getElementById('status-text').innerHTML = `房间已创建！<br>复制链接发给朋友吧：<br><strong style="color:#d46b6b;">${newUrl}</strong>`;
        setBackground('waiting');
    } else {
        document.getElementById('status-text').innerText = `房间号：${roomId}，等待双方写入...`;
        setBackground('waiting');
        listenForUpdates();
    }

    function handleFocus() {
        setBackground('writing');
    }

    async function submitTrait() {
        const text = document.getElementById('trait-input').value;
        if (!text.trim()) return alert("信纸还是空的哦！");

        const btn = document.getElementById('submit-btn');
        const statusText = document.getElementById('status-text');
        
        btn.disabled = true;
        btn.innerText = "信件飞行中...";
        localStorage.setItem('my_text_' + roomId, text);

        try {
            const { data: existingData, error: fetchError } = await supabase.from('messages').select('*').eq('room_id', roomId).single();

            if (fetchError && fetchError.code !== 'PGRST116') throw fetchError;

            let updateData = {};
            let isUserA = false;

            if (!existingData || !existingData.user_a) {
                updateData = { room_id: roomId, user_a: text };
                isUserA = true;
            } else if (!existingData.user_b) {
                updateData = { user_b: text };
            } else {
                alert("这个信箱已经满啦！");
                btn.disabled = false;
                btn.innerText = "投入信箱";
                return;
            }

            const { error } = await supabase.from('messages').upsert(updateData);
            if (error) throw error;

            btn.innerText = "✅ 已投入信箱";
            statusText.innerText = "信件已送达，等待对方也写完...";
            setBackground('submitted');
            
            if(isUserA && !existingData) {
                 statusText.innerHTML += `<br><span style="font-size:12px; color:#d46b6b;">(别忘了把链接发给对方哦)</span>`;
            }
        } catch (err) {
            console.error(err);
            alert("出错了：" + err.message);
            btn.disabled = false;
            btn.innerText = "重试";
        }
    }

    function listenForUpdates() {
        supabase.channel('room-' + roomId)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` }, payload => {
                checkCompletion(payload.new);
            })
            .subscribe();
        
        supabase.from('messages').select('*').eq('room_id', roomId).single().then(({ data, error }) => {
            if (!error && data) checkCompletion(data);
        });
    }

    function checkCompletion(data) {
        if (data && data.user_a && data.user_b) {
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            setBackground('success');
            
            const myText = localStorage.getItem('my_text_' + roomId) || "未知内容";
            let otherText = (myText === data.user_a) ? data.user_b : data.user_a;
            
            document.getElementById('other-trait').innerText = otherText;
            document.getElementById('my-trait').innerText = myText;
        }
    }
</script>

</body>
</html>
