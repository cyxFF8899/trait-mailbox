<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特质交换信箱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f0f4f8; 
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5a4a42;
            overflow-x: hidden;
        }
        .container {
            width: 80%;
            max-width: 450px;
            
            /* 默认是小巧状态 */
            background: rgba(255, 248, 220, 0.4); /* 更透明 */
            backdrop-filter: blur(5px);            /* 轻微毛玻璃 */
            -webkit-backdrop-filter: blur(5px);
            
            padding: 20px 25px;                    /* 内边距变小 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
            
            /* 添加过渡动画 */
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* 弹性动画 */
        }

        /* 展开状态 */
        .container.large {
            background: rgba(255, 248, 220, 0.85); /* 不透明度提高 */
            backdrop-filter: blur(12px);           /* 毛玻璃增强 */
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;                    /* 内边距变大 */
        }

        h1 { color: #d46b6b; margin-bottom: 25px; font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        textarea {
            width: 100%; height: 140px; padding: 20px; border: 2px dashed #e0c9a6; border-radius: 12px;
            font-size: 17px; resize: none; background: rgba(255, 255, 255, 0.5);
            color: #5a4a42;
            outline: none; transition: all 0.3s; line-height: 1.6; font-family: 'KaiTi', '楷体', serif;
        }
        textarea:focus { border-color: #d46b6b; background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 15px rgba(212, 107, 107, 0.2); transform: scale(1.02); }
        button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); color: white; border: none;
            padding: 14px 45px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 25px;
            transition: all 0.3s; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.6); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .status { margin-top: 20px; color: #888; font-size: 15px; line-height: 1.6; background: rgba(255,255,255,0.3); padding: 10px; border-radius: 8px; }
        .result-box { display: none; text-align: left; background: rgba(255, 255, 255, 0.7); border: 1px solid #eecfa1; padding: 25px; margin-top: 25px; border-radius: 15px; font-size: 17px; line-height: 1.8; }
        .hidden { display: none; }
        @media (max-width: 600px) { .container { padding: 30px 20px; width: 85%; } h1 { font-size: 22px; } }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <h1>💌 特质交换信箱</h1>
        
        <div id="input-area">
            <p style="margin-bottom: 15px; color: #666;">请写下对方的特质：</p>
            <textarea id="trait-input" placeholder="例如：温柔、像小太阳一样..." onfocus="handleFocus()" onblur="handleBlur()"></textarea>
            <button id="submit-btn" onclick="submitTrait()">投入信箱</button>
            <p class="status" id="status-text">正在初始化房间...</p>
        </div>

        <div id="result-area" class="hidden">
            <h2 style="color: #d46b6b; margin-bottom: 20px;">🎉 信件交换成功！</h2>
            <div class="result-box" style="display:block;">
                <span class="result-title">✨ 对方写给你的：</span>
                <p id="other-trait" style="font-style: italic; color: #555; margin-top:5px;">加载中...</p>
            </div>
            <div class="result-box" style="display:block; background: rgba(255,255,255,0.5); border: 1px solid #eecfa1; padding: 20px; margin-top: 20px; border-radius: 15px;">
                <span class="result-title">💌 你写给对方的：</span>
                <p id="my-trait" style="color: #888; margin-top:5px;"></p>
            </div>
        </div>
    </div>
